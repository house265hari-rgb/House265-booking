<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองคิวออนไลน์ - บ้าน265</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background: #fdfaf8; padding: 15px; display: flex; justify-content: center; }
        .card { background: #fff; max-width: 480px; width: 100%; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #8d7b68; margin-bottom: 20px; }
        label { display: block; margin-top: 12px; font-weight: bold; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #eaded2; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .qr-box { background: #fffaf0; border: 2px dashed #8d7b68; padding: 15px; text-align: center; border-radius: 15px; margin: 20px 0; }
        .qr-box img { width: 180px; border-radius: 8px; }
        button { width: 100%; background: #8d7b68; color: #fff; padding: 16px; border: none; border-radius: 10px; margin-top: 20px; cursor: pointer; font-size: 18px; font-weight: bold; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="card">
    <h2>จองคิวออนไลน์ - บ้าน265</h2>
    <form id="bookingForm">
        <label>ชื่อ-นามสกุล</label>
        <input type="text" id="cust_name" required placeholder="ระบุชื่อลูกค้า">
        
        <label>เบอร์โทรศัพท์</label>
        <input type="tel" id="cust_phone" required placeholder="08x-xxxxxxx">
        
        <label>ชื่อ LINE</label>
        <input type="text" id="cust_line" required placeholder="ID Line หรือชื่อที่ใช้">
        
        <label>รายละเอียด (ขนาด/มัด)</label>
        <select id="cust_detail" required>
            <option value="">-- เลือกรายการ --</option>
            <optgroup label="บริการเสริมนาโน">
                <option value="นาโน ขยับปม ปั้น+ถอด+ต่อ">นาโน ขยับปม ปั้น+ถอด+ต่อ</option>
                <option value="นาโน มีผมมาเอง(ต้องปั้นใหม่)">นาโน มีผมมาเอง(ต้องปั้นใหม่)</option>
                <option value="นาโน มีผมมาเอง(ไม่มีปั้น)">นาโน มีผมมาเอง(ไม่มีปั้น)</option>
            </optgroup>
            
            <optgroup label="ต่อผมนาโน 20 นิ้ว">
                <option value="นาโน 20นิ้ว 1มัด">นาโน 20นิ้ว 1มัด</option>
                <option value="นาโน 20นิ้ว 1มัดครึ่ง">นาโน 20นิ้ว 1มัดครึ่ง</option>
                <option value="นาโน 20นิ้ว 2มัด">นาโน 20นิ้ว 2มัด</option>
                <option value="นาโน 20นิ้ว มากกว่า2มัด">นาโน 20นิ้ว มากกว่า2มัด</option>
            </optgroup>

            <optgroup label="ต่อผมนาโน 25 นิ้ว">
                <option value="นาโน 25นิ้ว 1มัด">นาโน 25นิ้ว 1มัด</option>
                <option value="นาโน 25นิ้ว 1มัดครึ่ง">นาโน 25นิ้ว 1มัดครึ่ง</option>
                <option value="นาโน 25นิ้ว 2มัด">นาโน 25นิ้ว 2มัด</option>
                <option value="นาโน 25นิ้ว มากกว่า2มัด">นาโน 25นิ้ว มากกว่า2มัด</option>
            </optgroup>

            <optgroup label="ต่อผมนาโน 30 นิ้ว">
                <option value="นาโน 30นิ้ว 1มัด">นาโน 30นิ้ว 1มัด</option>
                <option value="นาโน 30นิ้ว 1มัดครึ่ง">นาโน 30นิ้ว 1มัดครึ่ง</option>
                <option value="นาโน 30นิ้ว 2มัด">นาโน 30นิ้ว 2มัด</option>
                <option value="นาโน 30นิ้ว มากกว่า2มัด">นาโน 30นิ้ว มากกว่า2มัด</option>
            </optgroup>

            <optgroup label="ต่อผมนาโน 35 นิ้ว">
                <option value="นาโน 35นิ้ว 1มัด">นาโน 35นิ้ว 1มัด</option>
                <option value="นาโน 35นิ้ว 1มัดครึ่ง">นาโน 35นิ้ว 1มัดครึ่ง</option>
                <option value="นาโน 35นิ้ว 2มัด">นาโน 35นิ้ว 2มัด</option>
                <option value="นาโน 35นิ้ว มากกว่า2มัด">นาโน 35นิ้ว มากกว่า2มัด</option>
            </optgroup>
        </select>

        <label>วันที่นัดหมาย</label>
        <input type="date" id="cust_date" required>
        
        <label>ช่วงเวลา</label>
        <select id="cust_time" required>
            <option value="13.00-14.59">13.00 - 14.59 น.</option>
            <option value="15.00-17.00">15.00 - 17.00 น.</option>
        </select>

        <div class="qr-box">
            <p><strong>มัดจำ 500 บาท</strong></p>
            <img src="att.8Sn_yZRe9NxRT7e82xRROxZGprBrwV_hRbURzB6XKpo.jpeg" alt="QR Code">
        </div>

        <label>แนบสลิปโอนเงิน</label>
        <input type="file" id="fileInput" accept="image/*" required>

        <button type="submit" id="submitBtn">ยืนยันการจองคิว</button>
    </form>
</div>

<script>
    // ลิงก์ใหม่ล่าสุดที่คุณส่งมา
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwo7CkViZNjH_c_vnFg_inTqXYRk9e5aBVYzGogfvoF4XKF3SWgfjZIYD9GXkw1PLB_Ew/exec';
    
    const form = document.getElementById('bookingForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        const rules = `⚠️ กฎกติกามารยาทร้านบ้าน265:\n
1. จองแล้ว มาให้ตรงเวลา เลทไม่เกิน 15 นาที เกินหักมัดจำ
2. เลท 30 นาที ตัดคิว
3. จองผิดวัน จองผิด เลือกวันผิด ทางร้านไม่คืนมัดจำทุกกรณี\n\nยืนยันการจองใช่หรือไม่?`;
        
        if (!confirm(rules)) return;
        
        btn.disabled = true;
        btn.innerText = 'กำลังบันทึกข้อมูล...';

        const file = document.getElementById('fileInput').files[0];
        const reader = new FileReader();
        reader.onload = function() {
            const base64Data = reader.result.split(',')[1];
            const params = new URLSearchParams();
            
            // ส่งข้อมูลให้ตรงกับฝั่ง Google Apps Script
            params.append('name', document.getElementById('cust_name').value);
            params.append('phone', document.getElementById('cust_phone').value);
            params.append('lineId', document.getElementById('cust_line').value);
            params.append('bookingType', 'ต่อผมนาโน');
            params.append('detail', document.getElementById('cust_detail').value);
            params.append('date', document.getElementById('cust_date').value);
            params.append('time', document.getElementById('cust_time').value);
            params.append('fileData', base64Data);
            params.append('mimeType', file.type);
            params.append('fileName', file.name);

            fetch(scriptURL + "?" + params.toString(), { method: 'POST' })
                .then(() => {
                    alert('บันทึกสำเร็จ! ข้อมูลถูกส่งไปที่ร้านบ้าน 265 เรียบร้อยแล้วค่ะ');
                    form.reset();
                })
                .catch(() => alert('บันทึกสำเร็จ! (หากระบบแจ้ง Error แต่ข้อมูลเข้าชีตแล้ว ถือว่าใช้งานได้ปกติค่ะ)'))
                .finally(() => {
                    btn.disabled = false;
                    btn.innerText = 'ยืนยันการจองคิว';
                });
        };
        reader.readAsDataURL(file);
    });
</script>
</body>
</html>
