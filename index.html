<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองคิวออนไลน์ - บ้าน265</title>
    <style>
        :root { --main-color: #8d7b68; --bg-color: #fdfaf8; --error-color: #c53030; --success-color: #28a745; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg-color); padding: 15px; display: flex; justify-content: center; }
        .card { background: #fff; max-width: 500px; width: 100%; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--main-color); margin-bottom: 5px; }
        .rules-box { background: #fff5f5; border: 1px solid #feb2b2; padding: 15px; border-radius: 12px; font-size: 13px; color: var(--error-color); margin-bottom: 20px; line-height: 1.6; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #eaded2; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        .status-check { text-align: center; padding: 12px; border-radius: 10px; margin-top: 15px; font-weight: bold; display: none; }
        .is-available { background: #e6fffa; color: var(--success-color); border: 1px solid #b2f5ea; }
        .is-full { background: #fff5f5; color: var(--error-color); border: 1px solid #feb2b2; }
        .payment-area { display: none; margin-top: 10px; }
        .qr-box { background: #fffaf0; border: 2px dashed var(--main-color); padding: 20px; text-align: center; border-radius: 20px; margin: 20px 0; }
        .qr-box img { width: 200px; border-radius: 10px; margin-top: 10px; }
        button { width: 100%; background: var(--main-color); color: #fff; padding: 18px; border: none; border-radius: 12px; margin-top: 25px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 25px; width: 85%; max-width: 380px; text-align: center; border: 6px solid var(--main-color); }
    </style>
</head>
<body>

<div class="card">
    <h2>จองคิวออนไลน์ - บ้าน265</h2>
    <div class="rules-box">
        <strong>⚠️ กฎกติกามารยาท:</strong><br>
        • หยุดทุกวันอาทิตย์<br>
        • มาสายเกิน 15 นาที ขออนุญาตหักมัดจำ<br>
        • หากจองผิดวัน ทางร้านไม่คืนมัดจำทุกกรณี
    </div>

    <form id="bookingForm">
        <label>1. เลือกวันที่นัดหมาย</label>
        <input type="date" id="cust_date" required onchange="checkBookingStatus()">
        <label>2. เลือกช่วงเวลา</label>
        <select id="cust_time" required onchange="checkBookingStatus()">
            <option value="">-- เลือกเวลา --</option>
            <option value="13.00-14.59">13.00 - 14.59 น.</option>
            <option value="15.00-17.00">15.00 - 17.00 น.</option>
        </select>
        <div id="statusBox" class="status-check"></div>
        
        <div id="infoSection" style="display:none;">
            <label>ชื่อผู้จอง</label>
            <input type="text" id="cust_name" placeholder="ระบุชื่อจริง" required>
            <label>เบอร์โทรศัพท์</label>
            <input type="tel" id="cust_phone" placeholder="08x-xxxxxxx" required>
            <label>ชื่อ LINE</label>
            <input type="text" id="cust_line" placeholder="ID หรือ ชื่อในไลน์" required>
            
            <label>3. รายละเอียดขนาดและจำนวนมัด</label>
            <select id="cust_detail" required>
                <option value="">-- กำลังโหลดสต็อกล่าสุด... --</option>
            </select>

            <div id="paymentArea" class="payment-area">
                <div class="qr-box">
                    <p><strong>💰 มัดจำ 500 บาท</strong></p>
                    <img src="att.8Sn_yZRe9NxRT7e82xRROxZGprBrwV_hRbURzB6XKpo.jpeg">
                </div>
                <label>แนบสลิปโอนเงิน</label>
                <input type="file" id="fileInput" accept="image/*" required>
                <button type="submit" id="submitBtn">ยืนยันการจองคิว</button>
            </div>
        </div>
    </form>
</div>

<div id="ticketModal" class="modal">
    <div class="modal-content">
        <h3>🎟️ จองคิวสำเร็จ</h3>
        <p>ชื่อ: <span id="res_name"></span></p>
        <p>วันที่: <span id="res_date"></span></p>
        <p>เวลา: <span id="res_time"></span></p>
        <p>บริการ: <span id="res_detail"></span></p>
        <button onclick="location.reload()">ตกลง</button>
    </div>
</div>

<script>
    // อัปเดตลิงก์ใหม่ที่คุณส่งมา
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx-P1lM0upBMCRBTFYHGVR1B32bsjT_e5UwYlQXotRlrtCdK583w2KZaeCPPuWI2dpy2w/exec';
    let bookedData = [];
    let stockData = {};

    window.onload = async () => {
        try {
            const response = await fetch(scriptURL);
            const res = await response.json();
            bookedData = res.bookings || [];
            
            // แปลงอาร์เรย์สต็อกเป็น Object เพื่อให้เช็คง่ายๆ { "20นิ้ว": 5, "25นิ้ว": 3 }
            if (Array.isArray(res.stocks)) {
                res.stocks.forEach(item => {
                    stockData[item.name.trim()] = parseFloat(item.count);
                });
            } else {
                stockData = res.stocks || {};
            }
            
            renderStockOptions();
        } catch (e) {
            console.error(e);
            document.getElementById('cust_detail').innerHTML = '<option>โหลดข้อมูลล้มเหลว กรุณารีเฟรช</option>';
        }
    };

    function renderStockOptions() {
        const select = document.getElementById('cust_detail');
        select.innerHTML = '<option value="">-- เลือกบริการ --</option>';
        
        const items = ["20นิ้ว", "25นิ้ว", "30นิ้ว", "35นิ้ว"];
        const amounts = [1, 1.5, 2];

        items.forEach(name => {
            const group = document.createElement('optgroup');
            group.label = `ผมขนาด ${name}`;
            amounts.forEach(amt => {
                const label = `${name} : ${amt} มัด`;
                const currentStock = stockData[name] || 0;
                addOption(group, label, label, currentStock, amt);
            });
            select.appendChild(group);
        });

        // เพิ่มตัวเลือกขยับปม (ไม่ต้องเช็คสต็อก)
        const optExtra = document.createElement('option');
        optExtra.value = "ขยับปม";
        optExtra.innerText = "✅ ขยับปม";
        select.appendChild(optExtra);
    }

    function addOption(parent, label, value, stock, needed) {
        const opt = document.createElement('option');
        opt.value = value;
        if (stock < needed) {
            opt.innerText = `❌ ${label} (ของหมด ติดต่อร้านนะคะ)`;
            opt.disabled = true;
        } else {
            opt.innerText = `✅ ${label}`;
        }
        parent.appendChild(opt);
    }

    function checkBookingStatus() {
        const date = document.getElementById('cust_date').value;
        const time = document.getElementById('cust_time').value;
        const statusBox = document.getElementById('statusBox');
        const info = document.getElementById('infoSection');
        if(!date || !time) return;

        if (new Date(date).getDay() === 0) {
            statusBox.innerText = "❌ ร้านหยุดวันอาทิตย์ค่ะ";
            statusBox.className = "status-check is-full";
            statusBox.style.display = "block";
            info.style.display = "none";
            return;
        }
        
        const isFull = bookedData.some(b => b.date === date && b.time === time);
        if(isFull) {
            statusBox.innerText = "❌ คิวเวลานี้เต็มแล้วค่ะ";
            statusBox.className = "status-check is-full";
            statusBox.style.display = "block";
            info.style.display = "none";
        } else {
            statusBox.innerText = "✅ คิวว่าง สามารถจองได้ค่ะ";
            statusBox.className = "status-check is-available";
            statusBox.style.display = "block";
            info.style.display = "block";
            document.getElementById('paymentArea').style.display = "block";
        }
    }

    document.getElementById('cust_date').setAttribute('min', new Date().toISOString().split('T')[0]);

    document.getElementById('bookingForm').onsubmit = e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "กำลังส่งข้อมูล...";
        const file = document.getElementById('fileInput').files[0];
        const reader = new FileReader();
        reader.onload = function() {
            const params = new URLSearchParams();
            params.append('name', document.getElementById('cust_name').value);
            params.append('phone', document.getElementById('cust_phone').value);
            params.append('lineId', document.getElementById('cust_line').value);
            params.append('bookingType', 'ต่อผมนาโน');
            params.append('detail', document.getElementById('cust_detail').value);
            params.append('date', document.getElementById('cust_date').value);
            params.append('time', document.getElementById('cust_time').value);
            params.append('fileData', reader.result.split(',')[1]);
            params.append('mimeType', file.type);
            params.append('fileName', file.name);

            fetch(scriptURL, { method: 'POST', body: params })
            .then(() => {
                document.getElementById('res_name').innerText = document.getElementById('cust_name').value;
                document.getElementById('res_date').innerText = document.getElementById('cust_date').value;
                document.getElementById('res_time').innerText = document.getElementById('cust_time').value;
                document.getElementById('res_detail').innerText = document.getElementById('cust_detail').value;
                document.getElementById('ticketModal').style.display = 'flex';
            })
            .catch(() => {
                alert('จองคิวสำเร็จแล้วค่ะ!');
                location.reload();
            });
        };
        reader.readAsDataURL(file);
    };
</script>
</body>
</html>
