<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองคิวออนไลน์ - บ้าน265</title>
    <style>
        :root { --main-color: #8d7b68; --bg-color: #fdfaf8; --error-color: #c53030; --success-color: #28a745; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg-color); padding: 15px; display: flex; justify-content: center; }
        .card { background: #fff; max-width: 500px; width: 100%; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--main-color); margin-bottom: 5px; }
        .rules-box { background: #fff5f5; border: 1px solid #feb2b2; padding: 15px; border-radius: 12px; font-size: 13px; color: var(--error-color); margin-bottom: 20px; line-height: 1.6; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #eaded2; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        
        .status-check { text-align: center; padding: 12px; border-radius: 10px; margin-top: 15px; font-weight: bold; display: none; }
        .is-available { background: #e6fffa; color: var(--success-color); border: 1px solid #b2f5ea; }
        .is-full { background: #fff5f5; color: var(--error-color); border: 1px solid #feb2b2; }

        .payment-area { display: none; margin-top: 10px; }
        .qr-box { background: #fffaf0; border: 2px dashed var(--main-color); padding: 20px; text-align: center; border-radius: 20px; margin: 20px 0; }
        .qr-box img { width: 200px; border-radius: 10px; margin-top: 10px; }
        button { width: 100%; background: var(--main-color); color: #fff; padding: 18px; border: none; border-radius: 12px; margin-top: 25px; cursor: pointer; font-size: 18px; font-weight: bold; }
        button:disabled { background: #ccc; }
        .loading { display: none; text-align: center; color: var(--main-color); font-weight: bold; margin-top: 10px; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 25px; width: 85%; max-width: 380px; text-align: center; border: 6px solid var(--main-color); position: relative; }
        .ticket-header { font-size: 22px; color: var(--main-color); font-weight: bold; border-bottom: 2px dashed #ddd; padding-bottom: 15px; margin-bottom: 20px; }
        .ticket-item { text-align: left; margin: 12px 0; font-size: 16px; line-height: 1.5; border-bottom: 1px solid #f9f9f9; padding-bottom: 5px; }
        .ticket-item b { color: var(--main-color); width: 90px; display: inline-block; }
    </style>
</head>
<body>

<div class="card">
    <h2>จองคิวออนไลน์ - บ้าน265</h2>
    <div class="rules-box">
        <strong>⚠️ กฎกติกามารยาท:</strong> หยุดวันอาทิตย์ | เลท 15 นาทีหักมัดจำ | จองผิดวันไม่คืนมัดจำ
    </div>

    <form id="bookingForm">
        <label>1. เลือกวันที่ต้องการนัดหมาย</label>
        <input type="date" id="cust_date" required onchange="checkBookingStatus()">
        
        <label>2. เลือกช่วงเวลา</label>
        <select id="cust_time" required onchange="checkBookingStatus()">
            <option value="">-- เลือกเวลา --</option>
            <option value="13.00-14.59">13.00 - 14.59 น.</option>
            <option value="15.00-17.00">15.00 - 17.00 น.</option>
        </select>

        <div id="statusBox" class="status-check"></div>

        <div id="infoSection" style="display:none;">
            <label>ชื่อ-นามสกุล</label>
            <input type="text" id="cust_name" placeholder="ระบุชื่อผู้จอง" required>
            
            <label>เบอร์โทรศัพท์</label>
            <input type="tel" id="cust_phone" placeholder="08x-xxxxxxx" required>
            
            <label>ชื่อ LINE</label>
            <input type="text" id="cust_line" placeholder="ID Line หรือ ชื่อในไลน์" required>
            
            <label>รายละเอียดขนาดและบริการ (ตามสต็อกปัจจุบัน)</label>
            <select id="cust_detail" required>
                <option value="">-- กำลังโหลดข้อมูลสต็อกล่าสุด... --</option>
            </select>

            <div class="payment-area" id="paymentArea">
                <div class="qr-box">
                    <p><strong>💰 มัดจำ 500 บาท</strong></p>
                    <img src="https://lh3.googleusercontent.com/d/1X_yZRe9NxRT7e82xRROxZGprBrwV_hRb"> <p style="font-size: 11px; color: #888; margin-top: 5px;">*โปรดโอนเงินแล้วแนบสลิปด้านล่าง*</p>
                </div>
                <label>แนบสลิปโอนเงิน</label>
                <input type="file" id="fileInput" accept="image/*" required>
                <button type="submit" id="submitBtn">ยืนยันการจองคิว</button>
            </div>
        </div>
        <div id="loadingText" class="loading">กำลังตรวจสอบข้อมูล...</div>
    </form>
</div>

<div id="ticketModal" class="modal">
    <div class="modal-content">
        <div class="ticket-header">🎟️ ยืนยันการจองคิว</div>
        <div class="ticket-item"><b>ผู้จอง:</b> <span id="res_name"></span></div>
        <div class="ticket-item"><b>วันที่:</b> <span id="res_date"></span></div>
        <div class="ticket-item"><b>เวลา:</b> <span id="res_time"></span></div>
        <div class="ticket-item"><b>บริการ:</b> <span id="res_detail"></span></div>
        
        <p style="color:#e53e3e; font-weight:bold; margin-top:20px;">📸 กรุณาแคปหน้าจอเก็บไว้เป็นหลักฐาน</p>
        <button class="close-btn" onclick="location.reload()">ตกลง (กลับหน้าหลัก)</button>
    </div>
</div>

<script>
    // อัปเดตลิงก์ใหม่ของคุณที่นี่
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyA5FdNBdEXhmyhyxZ4LdOkKZpvQmAcRtqlPjW2MriDwkHxBwyDiU47NHL60dBZglT9iQ/exec';
    let bookedData = [];

    window.onload = async () => {
        try {
            const response = await fetch(scriptURL);
            const resData = await response.json();
            
            bookedData = resData.bookings || [];
            const stockData = resData.stocks || [];
            
            const detailSelect = document.getElementById('cust_detail');
            detailSelect.innerHTML = '<option value="">-- เลือกขนาดและจำนวนมัด --</option>';
            
            if (stockData.length === 0) {
                detailSelect.innerHTML = '<option value="">❌ ไม่พบข้อมูลสต็อก</option>';
            }

            stockData.forEach(item => {
                const option = document.createElement('option');
                option.value = item.name;
                if (item.count <= 0) {
                    option.innerText = `❌ ${item.name} (ของหมด)`;
                    option.disabled = true;
                } else {
                    option.innerText = `✅ ${item.name} (คงเหลือ ${item.count})`;
                }
                detailSelect.appendChild(option);
            });
        } catch (e) {
            console.log("Error loading data:", e);
            document.getElementById('cust_detail').innerHTML = '<option value="">❌ โหลดข้อมูลล้มเหลว</option>';
        }
    };

    function checkBookingStatus() {
        const dateInput = document.getElementById('cust_date').value;
        const timeInput = document.getElementById('cust_time').value;
        const statusBox = document.getElementById('statusBox');
        const infoSection = document.getElementById('infoSection');

        if (!dateInput || !timeInput) return;

        if (new Date(dateInput).getDay() === 0) {
            statusBox.innerText = "❌ ขออภัยค่ะ ร้านหยุดวันอาทิตย์";
            statusBox.className = "status-check is-full";
            statusBox.style.display = "block";
            infoSection.style.display = "none";
            return;
        }

        const isFull = bookedData.some(b => b.date === dateInput && b.time === timeInput);

        if (isFull) {
            statusBox.innerText = "❌ ขออภัยค่ะ คิวเวลานี้เต็มแล้ว";
            statusBox.className = "status-check is-full";
            statusBox.style.display = "block";
            infoSection.style.display = "none";
        } else {
            statusBox.innerText = "✅ คิวว่าง สามารถจองได้ค่ะ";
            statusBox.className = "status-check is-available";
            statusBox.style.display = "block";
            infoSection.style.display = "block";
            document.getElementById('paymentArea').style.display = "block";
        }
    }

    document.getElementById('cust_date').setAttribute('min', new Date().toISOString().split('T')[0]);

    const form = document.getElementById('bookingForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const loading = document.getElementById('loadingText');
        const detailValue = document.getElementById('cust_detail').value;
        
        btn.disabled = true;
        loading.style.display = 'block';

        const file = document.getElementById('fileInput').files[0];
        const reader = new FileReader();
        reader.onload = function() {
            const params = new URLSearchParams();
            params.append('name', document.getElementById('cust_name').value);
            params.append('phone', document.getElementById('cust_phone').value);
            params.append('lineId', document.getElementById('cust_line').value);
            params.append('bookingType', 'ต่อผมนาโน');
            params.append('detail', detailValue);
            params.append('date', document.getElementById('cust_date').value);
            params.append('time', document.getElementById('cust_time').value);
            params.append('fileData', reader.result.split(',')[1]);
            params.append('mimeType', file.type);
            params.append('fileName', file.name);

            fetch(scriptURL, { method: 'POST', body: params })
            .then(res => res.text())
            .then(response => {
                loading.style.display = 'none';
                if (response.trim() === "Full") {
                    alert('❌ คิวนี้เพิ่งถูกจองไป รบกวนเปลี่ยนเวลาหรือวันนะคะ');
                    location.reload();
                } else {
                    document.getElementById('res_name').innerText = document.getElementById('cust_name').value;
                    document.getElementById('res_date').innerText = document.getElementById('cust_date').value;
                    document.getElementById('res_time').innerText = document.getElementById('cust_time').value;
                    document.getElementById('res_detail').innerText = detailValue;
                    document.getElementById('ticketModal').style.display = 'flex';
                }
            })
            .catch(() => {
                loading.style.display = 'none';
                alert('ส่งข้อมูลเรียบร้อยแล้วค่ะ!');
                location.reload();
            });
        };
        reader.readAsDataURL(file);
    });
</script>
</body>
</html>
