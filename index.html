<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองคิวออนไลน์ - บ้าน265</title>
    <style>
        :root { --main-color: #8d7b68; --bg-color: #fdfaf8; --error-color: #c53030; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg-color); padding: 15px; display: flex; justify-content: center; color: #333; }
        .card { background: #fff; max-width: 500px; width: 100%; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--main-color); margin-bottom: 5px; }
        .sub-title { text-align: center; color: #a89a8e; margin-bottom: 20px; font-size: 14px; }
        .rules-box { background: #fff5f5; border: 1px solid #feb2b2; padding: 12px; border-radius: 10px; font-size: 13px; color: var(--error-color); margin-bottom: 15px; }
        label { display: block; margin-top: 12px; font-weight: bold; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #eaded2; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        .qr-box { background: #fffaf0; border: 2px dashed var(--main-color); padding: 15px; text-align: center; border-radius: 15px; margin: 20px 0; }
        .qr-box img { width: 180px; border-radius: 8px; margin-top: 10px; }
        button { width: 100%; background: var(--main-color); color: #fff; padding: 16px; border: none; border-radius: 10px; margin-top: 20px; cursor: pointer; font-size: 18px; font-weight: bold; }
        button:disabled { background: #ccc; }
        .loading-text { display: none; text-align: center; color: var(--main-color); font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>จองคิวออนไลน์ - บ้าน265</h2>
    <div class="sub-title">ระบบตรวจสอบคิวว่างอัตโนมัติ</div>
    
    <div class="rules-box">
        <strong>⚠️ กฎกติกามารยาทร้านบ้าน265:</strong><br>
        • ร้านหยุดทุก **วันอาทิตย์**<br>
        1. จองแล้วมาให้ตรงเวลา เลทไม่เกิน 15 นาที<br>
        2. เลท 30 นาที ตัดคิวทันที<br>
        3. จองผิดวัน/เลือกวันผิด ทางร้านไม่คืนมัดจำทุกกรณี
    </div>

    <form id="bookingForm">
        <label>ชื่อ-นามสกุล</label>
        <input type="text" id="cust_name" placeholder="ระบุชื่อผู้จอง" required>
        
        <label>เบอร์โทรศัพท์</label>
        <input type="tel" id="cust_phone" placeholder="08x-xxxxxxx" required>
        
        <label>ชื่อ LINE</label>
        <input type="text" id="cust_line" placeholder="ID Line หรือ ชื่อในไลน์" required>
        
        <label>รายละเอียด (ขนาดและจำนวนมัด)</label>
        <select id="cust_detail" required>
            <option value="">-- เลือกขนาดและจำนวนมัด --</option>
            <optgroup label="ต่อผมนาโน 20 นิ้ว">
                <option value="นาโน 20นิ้ว 1มัด">20 นิ้ว : 1 มัด</option>
                <option value="นาโน 20นิ้ว 1มัดครึ่ง">20 นิ้ว : 1 มัดครึ่ง</option>
                <option value="นาโน 20นิ้ว 2มัด">20 นิ้ว : 2 มัด</option>
                <option value="นาโน 20นิ้ว มากกว่า2มัด">20 นิ้ว : มากกว่า 2 มัด</option>
            </optgroup>
            <optgroup label="ต่อผมนาโน 25 นิ้ว">
                <option value="นาโน 25นิ้ว 1มัด">25 นิ้ว : 1 มัด</option>
                <option value="นาโน 25นิ้ว 1มัดครึ่ง">25 นิ้ว : 1 มัดครึ่ง</option>
                <option value="นาโน 25นิ้ว 2มัด">25 นิ้ว : 2 มัด</option>
                <option value="นาโน 25นิ้ว มากกว่า2มัด">25 นิ้ว : มากกว่า 2 มัด</option>
            </optgroup>
            <optgroup label="ต่อผมนาโน 30 นิ้ว">
                <option value="นาโน 30นิ้ว 1มัด">30 นิ้ว : 1 มัด</option>
                <option value="นาโน 30นิ้ว 1มัดครึ่ง">30 นิ้ว : 1 มัดครึ่ง</option>
                <option value="นาโน 30นิ้ว 2มัด">30 นิ้ว : 2 มัด</option>
                <option value="นาโน 30นิ้ว มากกว่า2มัด">30 นิ้ว : มากกว่า 2 มัด</option>
            </optgroup>
            <optgroup label="ต่อผมนาโน 35 นิ้ว">
                <option value="นาโน 35นิ้ว 1มัด">35 นิ้ว : 1 มัด</option>
                <option value="นาโน 35นิ้ว 1มัดครึ่ง">35 นิ้ว : 1 มัดครึ่ง</option>
                <option value="นาโน 35นิ้ว 2มัด">35 นิ้ว : 2 มัด</option>
                <option value="นาโน 35นิ้ว มากกว่า2มัด">35 นิ้ว : มากกว่า 2 มัด</option>
            </optgroup>
            <optgroup label="งานบริการอื่นๆ">
                <option value="นาโน ขยับปม ปั้น+ถอด+ต่อ">นาโน ขยับปม ปั้น+ถอด+ต่อ</option>
                <option value="นาโน มีผมมาเอง(ต้องปั้นใหม่)">นาโน มีผมมาเอง (ต้องปั้นใหม่)</option>
                <option value="นาโน มีผมมาเอง(ไม่ต้องปั้น)">นาโน มีผมมาเอง (ไม่ต้องปั้น)</option>
            </optgroup>
        </select>

        <label>วันที่นัดหมาย (ร้านหยุดวันอาทิตย์)</label>
        <input type="date" id="cust_date" required onchange="checkSunday(this)">
        
        <label>ช่วงเวลา</label>
        <select id="cust_time" required>
            <option value="13.00-14.59">13.00 - 14.59 น.</option>
            <option value="15.00-17.00">15.00 - 17.00 น.</option>
        </select>

        <div class="qr-box">
            <p><strong>💰 มัดจำ 500 บาท</strong></p>
            <img src="att.8Sn_yZRe9NxRT7e82xRROxZGprBrwV_hRbURzB6XKpo.jpeg">
        </div>

        <label>แนบสลิปโอนเงิน</label>
        <input type="file" id="fileInput" accept="image/*" required>

        <button type="submit" id="submitBtn">ยืนยันการจองคิว</button>
        <div id="loading" class="loading-text">กำลังตรวจสอบคิวว่าง...</div>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwCPGVmwbDWNqKNhAw8m60oZkimTIOflJ8S6pnfjzZ9iBJQNQYFuLviyX3yyF3FeOajlw/exec';
    
    const form = document.getElementById('bookingForm');
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');

    function checkSunday(input) {
        const date = new Date(input.value);
        if (date.getUTCDay() === 0) {
            alert('ขออภัยค่ะ ร้านหยุดวันอาทิตย์ รบกวนเลือกวันอื่นนะคะ');
            input.value = '';
        }
    }

    document.getElementById('cust_date').setAttribute('min', new Date().toISOString().split('T')[0]);

    form.addEventListener('submit', e => {
        e.preventDefault();
        if (!confirm("ยืนยันการส่งข้อมูลจองคิว?")) return;
        
        btn.disabled = true;
        loading.style.display = 'block';

        const file = document.getElementById('fileInput').files[0];
        const reader = new FileReader();
        reader.onload = function() {
            const base64Data = reader.result.split(',')[1];
            const params = new URLSearchParams();
            params.append('name', document.getElementById('cust_name').value);
            params.append('phone', document.getElementById('cust_phone').value);
            params.append('lineId', document.getElementById('cust_line').value);
            params.append('bookingType', 'ต่อผมนาโน');
            params.append('detail', document.getElementById('cust_detail').value);
            params.append('date', document.getElementById('cust_date').value);
            params.append('time', document.getElementById('cust_time').value);
            params.append('fileData', base64Data);
            params.append('mimeType', file.type);
            params.append('fileName', file.name);

            fetch(scriptURL, { method: 'POST', body: params })
            .then(res => res.text())
            .then(response => {
                loading.style.display = 'none';
                if (response.trim() === "Full") {
                    alert('❌ ขออภัยค่ะ เวลานี้มีลูกค้าจองแล้ว รบกวนเปลี่ยนเวลาหรือวันที่นะคะ');
                    btn.disabled = false;
                } else {
                    alert('✅ จองสำเร็จ! แล้วพบกันที่ร้านบ้าน265 นะคะ');
                    form.reset();
                    btn.disabled = false;
                }
            })
            .catch(() => {
                loading.style.display = 'none';
                alert('ส่งข้อมูลเรียบร้อยแล้วค่ะ');
                form.reset();
                btn.disabled = false;
            });
        };
        reader.readAsDataURL(file);
    });
</script>
</body>
</html>
