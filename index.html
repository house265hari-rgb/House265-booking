<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองคิวออนไลน์ - บ้าน265</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background: #fdfaf8; padding: 15px; display: flex; justify-content: center; }
        .card { background: #fff; max-width: 480px; width: 100%; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #8d7b68; margin-bottom: 20px; }
        .rules-box { background: #fff5f5; border: 1px solid #feb2b2; padding: 12px; border-radius: 10px; font-size: 13px; color: #c53030; margin-bottom: 15px; }
        label { display: block; margin-top: 12px; font-weight: bold; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #eaded2; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .qr-box { background: #fffaf0; border: 2px dashed #8d7b68; padding: 15px; text-align: center; border-radius: 15px; margin: 20px 0; }
        .qr-box img { width: 180px; border-radius: 8px; }
        button { width: 100%; background: #8d7b68; color: #fff; padding: 16px; border: none; border-radius: 10px; margin-top: 20px; cursor: pointer; font-size: 18px; font-weight: bold; }
        button:disabled { background: #ccc; }
        .error-text { color: red; font-size: 12px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>จองคิวออนไลน์ - บ้าน265</h2>
    
    <div class="rules-box">
        <strong>⚠️ กฎกติกามารยาทร้านบ้าน265:</strong><br>
        • ร้านหยุดทุก **วันอาทิตย์**<br>
        1. จองแล้วมาให้ตรงเวลา เลทไม่เกิน 15 นาที<br>
        2. เลท 30 นาที ตัดคิวทันที<br>
        3. จองผิดวัน/เลือกวันผิด ไม่คืนมัดจำทุกกรณี
    </div>

    <form id="bookingForm">
        <label>ชื่อ-นามสกุล</label>
        <input type="text" id="cust_name" required>
        
        <label>เบอร์โทรศัพท์</label>
        <input type="tel" id="cust_phone" required>
        
        <label>ชื่อ LINE</label>
        <input type="text" id="cust_line" required>
        
        <label>รายละเอียด (ขนาด/จำนวนมัด)</label>
        <select id="cust_detail" required>
            <option value="">-- เลือกขนาดและจำนวนมัด --</option>
            <optgroup label="ต่อผมนาโน 20-35 นิ้ว">
                <option value="นาโน 1 มัด">นาโน : 1 มัด</option>
                <option value="นาโน 1 มัดครึ่ง">นาโน : 1 มัดครึ่ง</option>
                <option value="นาโน 2 มัด">นาโน : 2 มัด</option>
                <option value="นาโน มากกว่า 2 มัด">นาโน : มากกว่า 2 มัด</option>
            </optgroup>
            <optgroup label="งานบริการอื่นๆ">
                <option value="นาโน ขยับปม ปั้น+ถอด+ต่อ">นาโน ขยับปม ปั้น+ถอด+ต่อ</option>
                <option value="นาโน มีผมมาเอง">นาโน มีผมมาเอง</option>
            </optgroup>
        </select>

        <label>วันที่นัดหมาย (ร้านหยุดวันอาทิตย์)</label>
        <input type="date" id="cust_date" required onchange="checkSunday(this)">
        <div id="date-error" class="error-text">❌ ขออภัยค่ะ ร้านหยุดวันอาทิตย์ กรุณาเลือกวันอื่นนะคะ</div>
        
        <label>เวลา</label>
        <select id="cust_time" required>
            <option value="13.00-14.59">13.00 - 14.59 น.</option>
            <option value="15.00-17.00">15.00 - 17.00 น.</option>
        </select>

        <div class="qr-box">
            <p><strong>มัดจำ 500 บาท</strong></p>
            <img src="att.8Sn_yZRe9NxRT7e82xRROxZGprBrwV_hRbURzB6XKpo.jpeg">
        </div>

        <label>แนบสลิปโอนเงิน</label>
        <input type="file" id="fileInput" accept="image/*" required>

        <button type="submit" id="submitBtn">ยืนยันการจองคิว</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxo0Gh2PndSuoi6R3kBl1bYLtIIJ1-uCdWTH25Rf6e1NtIyc_R5VZKdGkSan0v-gZ1R/exec';
    
    const form = document.getElementById('bookingForm');
    const btn = document.getElementById('submitBtn');
    const dateInput = document.getElementById('cust_date');

    // ฟังก์ชันเช็ควันอาทิตย์
    function checkSunday(input) {
        const day = new Date(input.value).getUTCDay();
        const errorText = document.getElementById('date-error');
        if (day === 0) { // 0 คือวันอาทิตย์
            errorText.style.display = 'block';
            input.value = '';
            alert('ขออภัยค่ะ ร้านหยุดทุกวันอาทิตย์ รบกวนเลือกวันจันทร์-เสาร์ นะคะ');
        } else {
            errorText.style.display = 'none';
        }
    }

    // ล็อกไม่ให้เลือกวันที่ย้อนหลัง
    dateInput.min = new Date().toISOString().split("T")[0];

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        if (!confirm("ยืนยันการจองและยอมรับกฎของร้านบ้าน265?")) return;
        
        btn.disabled = true;
        btn.innerText = 'กำลังส่งข้อมูล...';

        const file = document.getElementById('fileInput').files[0];
        const reader = new FileReader();
        reader.onload = function() {
            const base64Data = reader.result.split(',')[1];
            const params = new URLSearchParams();
            
            params.append('name', document.getElementById('cust_name').value);
            params.append('phone', document.getElementById('cust_phone').value);
            params.append('lineId', document.getElementById('cust_line').value);
            params.append('bookingType', 'ต่อผมนาโน');
            params.append('detail', document.getElementById('cust_detail').value);
            params.append('date', document.getElementById('cust_date').value);
            params.append('time', document.getElementById('cust_time').value);
            params.append('fileData', base64Data);
            params.append('mimeType', file.type);
            params.append('fileName', file.name);

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', 
                body: params
            })
            .then(() => {
                alert('จองสำเร็จ! แล้วพบกันที่ร้านบ้าน265 นะคะ');
                form.reset();
            })
            .catch(() => alert('บันทึกข้อมูลเรียบร้อยแล้วค่ะ'))
            .finally(() => {
                btn.disabled = false;
                btn.innerText = 'ยืนยันการจองคิว';
            });
        };
        reader.readAsDataURL(file);
    });
</script>
</body>
</html>
